<h2 class="text-lg font-medium text-gray-800 mb-4">Existing Targets</h2>
{% if targets %}
<ul class="divide-y divide-gray-200">
    {% for t in targets %}
    <li class="py-3 flex justify-between items-center">
        <div>
            <p class="text-sm font-medium text-gray-900">{{ t.name }}</p>
            <p class="text-sm text-gray-500">{{ t.email }}</p>
        </div>
        <button hx-post="{{ url_for('delete_target', id=t.id) }}" 
                hx-target="#targets-list-container" 
                hx-confirm="Delete this target?"
                class="text-red-600 hover:text-red-900 text-sm font-medium">
            Delete
        </button>
    </li>
    {% endfor %}
</ul>
{% else %}
<p class="text-gray-500 text-sm">No targets added yet.</p>
{% endif %}
