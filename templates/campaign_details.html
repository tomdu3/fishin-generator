{% extends "base.html" %}
{% block header %}Campaign: {{ campaign.name }}{% endblock %}
{% block content %}
<div class="mb-6 flex justify-between items-center">
    <a href="{{ url_for('dashboard') }}" class="text-blue-600 hover:underline">&larr; Back to Dashboard</a>
    <span class="px-3 py-1 inline-flex text-sm leading-5 font-semibold rounded-full bg-green-100 text-green-800">
        {{ campaign.status }}
    </span>
</div>

<div id="campaign-stats" 
     class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6"
     hx-get="{{ url_for('campaign_stats', id=campaign.id) }}" 
     hx-trigger="every 5s">
    {% include 'partials/campaign_stats.html' %}
</div>

<div class="bg-white shadow rounded-lg">
    <div class="px-6 py-4 border-b border-gray-200">
        <h2 class="text-lg font-medium text-gray-800">Tracking Events</h2>
    </div>
    <div id="event-list" 
         class="p-6"
         hx-get="{{ url_for('campaign_events', id=campaign.id) }}" 
         hx-trigger="every 5s">
        {% include 'partials/event_list.html' %}
    </div>
</div>
{% endblock %}
