<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Phishing Simulator{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="flex h-screen bg-gray-100">
    <!-- Sidebar -->
    <div class="w-64 bg-gray-900 text-white flex flex-col">
        <div class="p-6 text-2xl font-bold border-b border-gray-800">🎣 PhishGen</div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="{{ url_for('dashboard') }}" class="block px-4 py-2 rounded hover:bg-gray-800">Dashboard</a>
            <a href="{{ url_for('manage_targets') }}" class="block px-4 py-2 rounded hover:bg-gray-800">Targets</a>
            <a href="{{ url_for('view_templates') }}" class="block px-4 py-2 rounded hover:bg-gray-800">Templates</a>
            <a href="{{ url_for('new_campaign') }}" class="block px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 mt-4 text-center font-semibold">New Campaign</a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white shadow px-6 py-4">
            <h1 class="text-xl font-semibold text-gray-800">{% block header %}Dashboard{% endblock %}</h1>
        </header>
        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-6">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
