{% extends "base.html" %}
{% block header %}Create New Campaign{% endblock %}
{% block content %}
<div class="bg-white shadow rounded-lg p-6 max-w-3xl mx-auto">
    <form action="{{ url_for('new_campaign') }}" method="POST">
        <div class="mb-6">
            <label for="name" class="block text-sm font-medium text-gray-700">Campaign Name</label>
            <input type="text" name="name" id="name" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 sm:text-sm">
        </div>

        <div class="mb-6">
            <label for="template_id" class="block text-sm font-medium text-gray-700">Select Template</label>
            <select name="template_id" id="template_id" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 sm:text-sm">
                <option value="">-- Choose a template --</option>
                {% for t in templates %}
                <option value="{{ t.id }}">{{ t.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Select Targets</label>
            <div class="border border-gray-300 rounded-md p-4 max-h-60 overflow-y-auto bg-gray-50">
                {% if targets %}
                    {% for t in targets %}
                    <div class="flex items-center mb-2">
                        <input id="target_{{ t.id }}" name="target_ids" value="{{ t.id }}" type="checkbox" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                        <label for="target_{{ t.id }}" class="ml-2 block text-sm text-gray-900">
                            {{ t.name }} &lt;{{ t.email }}&gt;
                        </label>
                    </div>
                    {% endfor %}
                {% else %}
                    <p class="text-sm text-gray-500">No targets available. <a href="{{ url_for('manage_targets') }}" class="text-blue-600">Add some targets first</a>.</p>
                {% endif %}
            </div>
        </div>

        <div class="flex justify-end">
            <button type="submit" class="bg-blue-600 border border-transparent rounded-md shadow-sm py-2 px-6 inline-flex justify-center text-sm font-medium text-white hover:bg-blue-700 focus:outline-none">
                Launch Campaign
            </button>
        </div>
    </form>
</div>
{% endblock %}
