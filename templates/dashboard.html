{% extends "base.html" %}
{% block header %}Dashboard{% endblock %}
{% block content %}
<div id="dashboard-stats" 
     class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6"
     hx-get="{{ url_for('dashboard_stats') }}" 
     hx-trigger="every 5s">
    {% include 'partials/dashboard_stats.html' %}
</div>

<div class="bg-white shadow rounded-lg">
    <div class="px-6 py-4 border-b border-gray-200">
        <h2 class="text-lg font-medium text-gray-800">Recent Campaigns</h2>
    </div>
    <div id="campaign-list" 
         class="p-6"
         hx-get="{{ url_for('campaign_list') }}" 
         hx-trigger="every 5s">
        {% include 'partials/campaign_list.html' %}
    </div>
</div>
{% endblock %}
