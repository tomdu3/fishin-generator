{% extends "base.html" %}
{% block header %}Phishing Templates{% endblock %}
{% block content %}
<div class="bg-white shadow rounded-lg p-6">
    <div class="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3">
        {% for template in templates %}
        <div class="border rounded-lg p-4 flex flex-col">
            <h3 class="text-lg font-semibold text-gray-800">{{ template.name }}</h3>
            <p class="text-sm text-gray-500 mt-1 mb-4 flex-1"><strong>Subject:</strong> {{ template.subject }}</p>
            <div class="bg-gray-50 p-3 rounded text-xs text-gray-700 overflow-y-auto max-h-32 border">
                {{ template.body_html | safe }}
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
